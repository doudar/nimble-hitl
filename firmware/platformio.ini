[platformio]
default_envs = esp32
extra_configs = generated_env.ini

[env]
platform = espressif32
framework = arduino
monitor_speed = 921600
upload_speed = 921600
lib_deps =
  h2zero/NimBLE-Arduino @ >=1.4.2,<1.5.0
  bblanchon/ArduinoJson @ >=7.0.4,<7.1.0
build_flags =
  -D CORE_DEBUG_LEVEL=3
  -D NIMBLE_CPP_IDF

[env:esp32]
board = esp32dev
build_flags =
  ${env.build_flags}
  -D TARGET_ESP32=1

[env:esp32s3]
board = esp32-s3-devkitc-1
build_flags =
  ${env.build_flags}
  -D TARGET_ESP32_S3=1

[env:esp32c3]
board = esp32-c3-devkitm-1
build_flags =
  ${env.build_flags}
  -D TARGET_ESP32_C3=1

