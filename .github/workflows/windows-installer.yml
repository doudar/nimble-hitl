name: Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Resolve app version
        id: version
        shell: pwsh
        run: |
          $versionLine = Select-String -Path 'host_app\pubspec.yaml' -Pattern '^version:\s*(.+)$'
          $version = $versionLine.Matches[0].Groups[1].Value.Trim()
          $normalizedVersion = $version.Split('+')[0]
          "app_version=$normalizedVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve release metadata
        id: release
        shell: pwsh
        run: |
          $versionTag = "v${{ steps.version.outputs.app_version }}"

          if ("${{ github.ref_type }}" -eq "tag") {
            $tagName = "${{ github.ref_name }}"
            if ($tagName -ne $versionTag) {
              throw "Tag '$tagName' does not match host_app/pubspec.yaml version '${{ steps.version.outputs.app_version }}'."
            }
            $releaseName = "NimBLE HITL $tagName"
            $preRelease = "false"
            $makeLatest = "true"
          } else {
            $tagName = $versionTag
            $releaseName = "NimBLE HITL $tagName"
            $preRelease = "false"
            $makeLatest = "true"
          }

          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$preRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "make_latest=$makeLatest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Ensure release tag exists
        if: github.ref_type != 'tag'
        shell: pwsh
        run: |
          $tagName = "${{ steps.release.outputs.tag_name }}"
          $targetSha = "${{ github.sha }}"

          git fetch --force --tags origin
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git show-ref --tags --verify --quiet "refs/tags/$tagName"
          if ($LASTEXITCODE -eq 0) {
            $existingTarget = (git rev-parse "refs/tags/$tagName^{}").Trim()
            if ($existingTarget -ne $targetSha) {
              throw "Tag '$tagName' already exists at $existingTarget, expected $targetSha. Bump host_app/pubspec.yaml before publishing a new release."
            }

            Write-Host "Release tag $tagName already exists at $existingTarget"
          } else {
            git tag -a "$tagName" "$targetSha" -m "Release $tagName"
            git push origin "refs/tags/$tagName"
          }

      - name: Validate and build Flutter host app
        working-directory: host_app
        shell: pwsh
        run: |
          flutter pub get
          flutter analyze
          flutter test
          flutter build windows

      - name: Validate firmware build
        shell: pwsh
        run: |
          python -m pip install platformio
          python -m platformio run --project-dir firmware

      - name: Stage self-contained Windows bundle
        shell: pwsh
        run: .\scripts\stage_windows_bundle.ps1 -RepoRoot $PWD

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer\windows\nimble_hitl.iss
          options: /DAppVersion=${{ steps.version.outputs.app_version }} /DStageDir="${{ github.workspace }}\dist\windows-installer"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimble-hitl-windows-installer-${{ steps.version.outputs.app_version }}
          path: dist/windows-installer/installer/*.exe

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.release_name }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          make_latest: ${{ steps.release.outputs.make_latest }}
          generate_release_notes: ${{ github.ref_type == 'tag' }}
          append_body: true
          body: |
            Commit: ${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          overwrite_files: true
          files: dist/windows-installer/installer/*.exe
